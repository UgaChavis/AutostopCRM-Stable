services:
  autostopcrm:
    container_name: autostopcrm
    build: .
    restart: always
    extra_hosts:
      - "crm.autostopcrm.ru:host-gateway"
    env_file:
      - .env
    ports:
      - "127.0.0.1:8000:41731"
      - "127.0.0.1:8001:41831"
    environment:
      MINIMAL_KANBAN_API_HOST: "0.0.0.0"
      MINIMAL_KANBAN_API_PORT: "41731"
      MINIMAL_KANBAN_MCP_HOST: "0.0.0.0"
      MINIMAL_KANBAN_MCP_PORT: "41831"
      MINIMAL_KANBAN_AGENT_ENABLED: "${MINIMAL_KANBAN_AGENT_ENABLED:-1}"
      MINIMAL_KANBAN_AGENT_BOARD_API_URL: "${MINIMAL_KANBAN_AGENT_BOARD_API_URL:-http://127.0.0.1:41731}"
      MINIMAL_KANBAN_MCP_PATH: "/mcp"
      MINIMAL_KANBAN_MCP_PUBLIC_BASE_URL: "${AUTOSTOP_PUBLIC_BASE_URL:-https://crm.autostopcrm.ru}"
      MINIMAL_KANBAN_MCP_PUBLIC_ENDPOINT_URL: "${AUTOSTOP_PUBLIC_MCP_URL:-https://crm.autostopcrm.ru/mcp}"
      MINIMAL_KANBAN_MCP_ALLOWED_HOSTS: "${AUTOSTOP_MCP_ALLOWED_HOSTS:-}"
      MINIMAL_KANBAN_MCP_ALLOWED_ORIGINS: "${AUTOSTOP_MCP_ALLOWED_ORIGINS:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
    volumes:
      - "${AUTOSTOP_DATA_DIR:-./data}:/root/.minimal-kanban"
    healthcheck:
      test: ["CMD", "python", "scripts/container_healthcheck.py"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s

  autostopcrm-telegram-ai:
    container_name: autostopcrm-telegram-ai
    build: .
    restart: always
    command: ["python", "main_telegram_ai.py"]
    depends_on:
      autostopcrm:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AUTOSTOP_TELEGRAM_AI_ENABLED: "${AUTOSTOP_TELEGRAM_AI_ENABLED:-0}"
      AUTOSTOP_TELEGRAM_BOT_TOKEN: "${AUTOSTOP_TELEGRAM_BOT_TOKEN:-}"
      AUTOSTOP_TELEGRAM_OWNER_IDS: "${AUTOSTOP_TELEGRAM_OWNER_IDS:-}"
      AUTOSTOP_CRM_API_BASE_URL: "${AUTOSTOP_CRM_API_BASE_URL:-http://autostopcrm:41731}"
      AUTOSTOP_AI_MODEL: "${AUTOSTOP_AI_MODEL:-gpt-5.4-mini}"
      AUTOSTOP_AI_REASONING_EFFORT: "${AUTOSTOP_AI_REASONING_EFFORT:-medium}"
      AUTOSTOP_AI_MAX_BATCH_CARDS: "${AUTOSTOP_AI_MAX_BATCH_CARDS:-20}"
      AUTOSTOP_AI_AUDIT_ENABLED: "${AUTOSTOP_AI_AUDIT_ENABLED:-1}"
      AUTOSTOP_AI_AUTOPILOT_ENABLED: "${AUTOSTOP_AI_AUTOPILOT_ENABLED:-0}"
      AUTOSTOP_AI_AUTOPILOT_INTERVAL_MINUTES: "${AUTOSTOP_AI_AUTOPILOT_INTERVAL_MINUTES:-30}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      OPENAI_MODEL: "${OPENAI_MODEL:-gpt-5.4-mini}"
      OPENAI_BASE_URL: "${OPENAI_BASE_URL:-https://api.openai.com/v1}"
    volumes:
      - "${AUTOSTOP_DATA_DIR:-./data}:/root/.minimal-kanban"
